name: ShortcutWheel
options:
  bundleIdPrefix: com.zkwokleung
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.zkwokleung.shortcutwheel
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  ShortcutWheel:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    info:
      path: Generated/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: ShortcutWheel
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: ""

  ShortcutWheelTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: ShortcutWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zkwokleung.shortcutwheel.tests
        GENERATE_INFOPLIST_FILE: YES
